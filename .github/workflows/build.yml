name: Build & Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Determine version
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        shell: pwsh
        run: |
          $file = "xray_fluent/constants.py"
          $content = Get-Content $file -Raw
          if ($content -notmatch 'APP_VERSION\s*=\s*"([^"]+)"') {
            throw "APP_VERSION not found"
          }
          $version = $Matches[1]
          echo "VERSION=$version" >> $env:GITHUB_ENV
          echo "RELEASE_TAG=v$version" >> $env:GITHUB_ENV
          Write-Host "Release version: $version (tag: v$version)"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py312-${{ hashFiles('requirements.txt') }}

      - name: Cache Inno Setup
        id: cache-inno
        uses: actions/cache@v4
        with:
          path: C:\Program Files (x86)\Inno Setup 6
          key: innosetup-6

      - name: Install Inno Setup
        if: steps.cache-inno.outputs.cache-hit != 'true'
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Resolve core releases
        id: core-releases
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $headers = @{ Authorization = "Bearer $env:GITHUB_TOKEN"; "User-Agent" = "Lumen-KVN-CI" }
          $xray = Invoke-RestMethod "https://api.github.com/repos/XTLS/Xray-core/releases?per_page=30" -Headers $headers |
            Where-Object { -not $_.draft -and $_.tag_name -match '^v?\d+\.\d+\.\d+' } |
            Sort-Object { [version](([regex]::Matches($_.tag_name, '\d+') | ForEach-Object Value)[0..2] -join '.') } -Descending |
            Select-Object -First 1
          $singbox = Invoke-RestMethod "https://api.github.com/repos/shtorm-7/sing-box-extended/releases/latest" -Headers $headers
          $geodata = Invoke-RestMethod "https://api.github.com/repos/runetfreedom/russia-v2ray-rules-dat/releases/latest" -Headers $headers
          "cache-key=$($xray.id)-$($singbox.id)-$($geodata.id)-wintun-0.14.1-rulesets-v1" >> $env:GITHUB_OUTPUT

      - name: Cache core binaries
        id: cache-cores
        uses: actions/cache@v4
        with:
          path: core
          key: cores-${{ runner.os }}-${{ steps.core-releases.outputs.cache-key }}

      - name: Download core binaries
        if: steps.cache-cores.outputs.cache-hit != 'true'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Force -Path core | Out-Null
          $githubHeaders = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            "X-GitHub-Api-Version" = "2022-11-28"
            "User-Agent" = "Lumen-KVN-CI"
          }

          Write-Host "Downloading Xray-core..."
          $xrayReleases = Invoke-RestMethod "https://api.github.com/repos/XTLS/Xray-core/releases?per_page=30" -Headers $githubHeaders
          $xrayRelease = $xrayReleases |
            Where-Object { -not $_.draft -and $_.tag_name -match '^v?\d+\.\d+\.\d+' } |
            Sort-Object {
              $parts = [regex]::Matches($_.tag_name, '\d+') | ForEach-Object { [int]$_.Value }
              [version]::new($parts[0], $parts[1], $parts[2])
            } -Descending |
            Select-Object -First 1
          Write-Host "Using Xray-core $($xrayRelease.tag_name)"
          $xrayAsset = $xrayRelease.assets | Where-Object { $_.name -match "Xray-windows-64\.zip$" }
          Invoke-WebRequest $xrayAsset.browser_download_url -OutFile xray.zip
          Expand-Archive xray.zip -DestinationPath _xray -Force
          Copy-Item _xray/xray.exe core/
          Remove-Item -Recurse _xray, xray.zip

          Write-Host "Downloading RuNetFreedom geoip/geosite..."
          $geoBase = "https://github.com/runetfreedom/russia-v2ray-rules-dat/releases/latest/download"
          Invoke-WebRequest "$geoBase/geoip.dat" -OutFile core/geoip.dat
          Invoke-WebRequest "$geoBase/geosite.dat" -OutFile core/geosite.dat
          Invoke-WebRequest "$geoBase/sing-box.zip" -OutFile geodata-singbox.zip
          Expand-Archive geodata-singbox.zip -DestinationPath _geodata-singbox -Force
          New-Item -ItemType Directory -Force -Path core/rule-sets | Out-Null
          $ruleSets = @(
            "rule-set-geosite/geosite-category-ru.srs",
            "rule-set-geosite/geosite-ru-blocked.srs",
            "rule-set-geoip/geoip-ru.srs",
            "rule-set-geoip/geoip-ru-blocked.srs",
            "rule-set-geoip/geoip-ru-blocked-community.srs"
          )
          foreach ($ruleSet in $ruleSets) {
            Copy-Item (Join-Path _geodata-singbox $ruleSet) core/rule-sets/
          }
          Remove-Item -Recurse _geodata-singbox, geodata-singbox.zip

          Write-Host "Downloading wintun..."
          Invoke-WebRequest "https://www.wintun.net/builds/wintun-0.14.1.zip" -OutFile wintun.zip
          Expand-Archive wintun.zip -DestinationPath _wintun -Force
          Copy-Item _wintun/wintun/bin/amd64/wintun.dll core/
          Remove-Item -Recurse _wintun, wintun.zip

          Write-Host "Downloading sing-box-extended..."
          $sbRelease = Invoke-RestMethod "https://api.github.com/repos/shtorm-7/sing-box-extended/releases/latest" -Headers $githubHeaders
          Write-Host "Using sing-box $($sbRelease.tag_name)"
          $sbAsset = $sbRelease.assets | Where-Object { $_.name -match "windows-amd64\.zip$" -and $_.name -notmatch "\.sig" }
          Invoke-WebRequest $sbAsset.browser_download_url -OutFile singbox.zip
          Expand-Archive singbox.zip -DestinationPath _sb -Force
          Get-ChildItem _sb -Recurse -Filter "sing-box.exe" | ForEach-Object { Copy-Item $_.FullName core/sing-box.exe }
          Remove-Item -Recurse _sb, singbox.zip

          Write-Host "Core binaries ready:"
          Get-ChildItem core/

      - name: Build QML app, installer and portable archive
        shell: pwsh
        run: |
          python build.py

      - name: List release assets
        shell: pwsh
        run: Get-ChildItem dist/LumenKVN-Setup-windows-x64.exe, dist/LumenKVN-portable-windows-x64.zip | Format-Table Name, Length

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: LumenKVN-portable
          path: dist/LumenKVN-portable-windows-x64.zip

      - name: Check existing release
        if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $exists = $false

          try {
            gh release view $env:RELEASE_TAG *> $null

            if ($LASTEXITCODE -eq 0) {
              $exists = $true
            }
          }
          catch {
            $exists = $false
          }

          if ($exists) {
            "RELEASE_EXISTS=true" >> $env:GITHUB_ENV
            Write-Host "Release $env:RELEASE_TAG already exists."
          }
          else {
            "RELEASE_EXISTS=false" >> $env:GITHUB_ENV
            Write-Host "Release $env:RELEASE_TAG does not exist."
          }

          exit 0

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch' && env.RELEASE_EXISTS != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "Lumen KVN ${{ env.RELEASE_TAG }}"
          body: |
            ## Что изменилось

            - [feat(settings)]: Разделы подписок и DNS оформлены отдельными карточками, настройки автопереключения перенесены в «Сеть», а сброс настроек восстанавливает значения по умолчанию без удаления серверов.
            - [feat(dns)]: Добавлены рекомендуемые DNS-серверы и новые параметры встроенного DNS; обновлённые значения по умолчанию применяются один раз, а DNS-настройки Xray и sing-box формируются с учётом выбранного режима.
            - [feat(routing)]: Панель маршрутизации переработана вокруг быстрых и пользовательских пресетов; сервисы используют только действия «прокси» или «напрямую», добавлен импорт правил из TXT, JSON и YAML.
            - [feat(subscriptions)]: Добавлены User-Agent приложения Happ, конвертация подписок и фильтрация серверов регулярными выражениями.
            - [feat(updates)]: Для Xray добавлены каналы Stable и Beta, а проверки sing-box, droute и geoip/geosite теперь запускаются независимо друг от друга.
            - [fix(updates)]: Обновления ядер и ресурсов получили проверку версии, содержимого и безопасную установку; при включённом TUN больше не используется лишний localhost-прокси, временный обрыв соединения повторяется автоматически, а название версии sing-box остаётся стабильным.
            - [fix(runtime)]: Конфигурации Xray и sing-box проверяются до запуска; улучшены совместимость компонентов, переключение runtime и обработка неподдерживаемых параметров.
            - [fix(storage)]: Состояние приложения сохраняется атомарно с ротацией резервных копий и восстанавливается после повреждения или прерванной записи.
            - [fix(ui)]: Смена языка больше не возвращает окно к ранее сохранённому размеру.
            - [feat(vless)]: В редактор VLESS добавлена настройка и проверка TLS certificate pinning.

            Full Changelog: https://github.com/krambovic/Lumen-KVN/compare/v1.8.5...v1.8.6
          generate_release_notes: false
          make_latest: true
          files: |
            dist/LumenKVN-Setup-windows-x64.exe
            dist/LumenKVN-portable-windows-x64.zip
