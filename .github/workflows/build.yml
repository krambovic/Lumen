name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        shell: pwsh
        run: |
          $file = "xray_fluent/constants.py"
          $content = Get-Content $file -Raw
          if ($content -notmatch 'APP_VERSION\s*=\s*"([^"]+)"') {
            throw "APP_VERSION not found"
          }
          $version = $Matches[1]
          echo "VERSION=$version" >> $env:GITHUB_ENV
          echo "RELEASE_TAG=v$version" >> $env:GITHUB_ENV
          Write-Host "Release version: $version (tag: v$version)"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Download core binaries
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path core | Out-Null

          Write-Host "Downloading Xray-core..."
          $xrayReleases = Invoke-RestMethod "https://api.github.com/repos/XTLS/Xray-core/releases?per_page=30"
          $xrayRelease = $xrayReleases |
            Where-Object { -not $_.draft -and $_.tag_name -match '^v?\d+\.\d+\.\d+' } |
            Sort-Object {
              $m = [regex]::Match($_.tag_name, '\d+')
              $parts = [regex]::Matches($_.tag_name, '\d+') | ForEach-Object { [int]$_.Value }
              [version]::new($parts[0], $parts[1], $parts[2])
            } -Descending |
            Select-Object -First 1
          Write-Host "Using Xray-core $($xrayRelease.tag_name)"
          $xrayAsset = $xrayRelease.assets | Where-Object { $_.name -match "Xray-windows-64\.zip$" }
          Invoke-WebRequest $xrayAsset.browser_download_url -OutFile xray.zip
          Expand-Archive xray.zip -DestinationPath _xray -Force
          Copy-Item _xray/xray.exe core/
          Copy-Item _xray/geoip.dat core/
          Copy-Item _xray/geosite.dat core/
          Remove-Item -Recurse _xray, xray.zip

          Write-Host "Downloading tun2socks..."
          $tunRelease = Invoke-RestMethod "https://api.github.com/repos/xjasonlyu/tun2socks/releases/latest"
          $tunAsset = $tunRelease.assets | Where-Object { $_.name -match "windows-amd64\.zip$" }
          Invoke-WebRequest $tunAsset.browser_download_url -OutFile tun2socks.zip
          Expand-Archive tun2socks.zip -DestinationPath _tun -Force
          Get-ChildItem _tun -Recurse -Filter "*.exe" | ForEach-Object { Copy-Item $_.FullName core/tun2socks.exe }
          Remove-Item -Recurse _tun, tun2socks.zip

          Write-Host "Downloading wintun..."
          Invoke-WebRequest "https://www.wintun.net/builds/wintun-0.14.1.zip" -OutFile wintun.zip
          Expand-Archive wintun.zip -DestinationPath _wintun -Force
          Copy-Item _wintun/wintun/bin/amd64/wintun.dll core/
          Remove-Item -Recurse _wintun, wintun.zip

          Write-Host "Downloading sing-box-extended..."
          $sbRelease = Invoke-RestMethod "https://api.github.com/repos/shtorm-7/sing-box-extended/releases/latest"
          Write-Host "Using sing-box $($sbRelease.tag_name)"
          $sbAsset = $sbRelease.assets | Where-Object { $_.name -match "windows-amd64\.zip$" -and $_.name -notmatch "\.sig" }
          Invoke-WebRequest $sbAsset.browser_download_url -OutFile singbox.zip
          Expand-Archive singbox.zip -DestinationPath _sb -Force
          Get-ChildItem _sb -Recurse -Filter "sing-box.exe" | ForEach-Object { Copy-Item $_.FullName core/sing-box.exe }
          Remove-Item -Recurse _sb, singbox.zip

          Write-Host "Core binaries ready:"
          Get-ChildItem core/

      - name: Build QML app, installer and portable archive
        shell: pwsh
        run: |
          python build.py

      - name: List release assets
        shell: pwsh
        run: Get-ChildItem dist/LumenKVN-Setup-windows-x64.exe, dist/LumenKVN-portable-windows-x64.zip | Format-Table Name, Length

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: LumenKVN-portable
          path: dist/LumenKVN/

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "Lumen KVN ${{ env.RELEASE_TAG }}"
          body: |
            ## Что изменилось

            - [Fix]: Удаление старой установки из `C:\\Program` теперь срабатывает после запуска новой версии из `Program Files\\Lumen KVN`.
            - [Fix]: Импорт `.conf` больше не крашит приложение и понимает обычный путь, `file:///...` и текст из буфера обмена.
            - [Feature]: WARP/WireGuard/AWG `.conf` отображаются в списке серверов со своими параметрами и доступны только в TUN на `sing-box-extended`.
            - [Fix]: Xray/системный прокси больше не пытается запускать WARP/WireGuard/AWG конфиги как обычный сервер.
            - [Fix]: Для WARP/AWG в TUN endpoint теперь резолвится через bootstrap DNS и прямой маршрут, чтобы пресеты маршрутизации не ломали подключение.
            - [Fix]: Проверены пресеты `Всё`, `Заблокированное`, `Кроме РФ` для TUN на `sing-box-extended`.
            - [Chore]: Версия обновлена до 1.1.3.
          generate_release_notes: false
          make_latest: true
          files: |
            dist/LumenKVN-Setup-windows-x64.exe
            dist/LumenKVN-portable-windows-x64.zip
